<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#d99a00" />
    <meta name="description" content="手機快速記帳採集端 PWA：離線記帳、IndexedDB 儲存、JSON/CSV 匯出匯入。" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
    <title>記帳金庫 Pocket Ledger</title>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">手機採集端 PWA</p>
          <h1>記帳金庫</h1>
        </div>
        <button id="themeToggle" class="ghost-button" type="button" aria-label="切換亮暗色">🌙</button>
      </header>

      <section class="status-card glass-card">
        <div>
          <p class="label">今日快速記帳</p>
          <strong id="todayTotal">0 元</strong>
        </div>
        <div>
          <p class="label">待匯出</p>
          <strong id="pendingCount">0 筆</strong>
        </div>
        <div>
          <p class="label">資料位置</p>
          <strong>本機 IndexedDB</strong>
        </div>
      </section>

      <section class="calculator-card glass-card" aria-labelledby="quickCaptureTitle">
        <div class="section-title">
          <div>
            <p class="label">先記金額，細節晚點補</p>
            <h2 id="quickCaptureTitle">快速記帳</h2>
          </div>
          <span id="saveHint" class="save-hint">離線可用</span>
        </div>

        <div class="display">
          <small id="formula">輸入金額</small>
          <output id="amountDisplay">0</output>
        </div>

        <div class="keypad" aria-label="金額小鍵盤">
          <button type="button" data-key="7">7</button>
          <button type="button" data-key="8">8</button>
          <button type="button" data-key="9">9</button>
          <button type="button" data-key="+">＋</button>
          <button type="button" data-key="4">4</button>
          <button type="button" data-key="5">5</button>
          <button type="button" data-key="6">6</button>
          <button type="button" data-key="-">－</button>
          <button type="button" data-key="1">1</button>
          <button type="button" data-key="2">2</button>
          <button type="button" data-key="3">3</button>
          <button type="button" data-key="*">×</button>
          <button type="button" data-key="0">0</button>
          <button type="button" data-key="00">00</button>
          <button type="button" data-key=".">.</button>
          <button type="button" data-key="/">÷</button>
        </div>

        <div class="calc-actions">
          <button id="clearButton" type="button">清除</button>
          <button id="backspaceButton" type="button">退一格</button>
          <button id="equalsButton" class="accent-button" type="button">＝</button>
        </div>

        <button id="quickSaveButton" class="primary-button" type="button">快速記帳即可</button>
        <button id="openDetailButton" class="secondary-button" type="button">補名目與分類</button>

        <form id="detailForm" class="detail-form" hidden>
          <label>
            類型
            <select id="typeInput" name="type">
              <option value="expense">支出</option>
              <option value="income">收入</option>
            </select>
          </label>
          <label>
            日期
            <input id="dateInput" name="date" type="date" />
          </label>
          <label>
            分類
            <input id="categoryInput" name="category" placeholder="例如：餐飲、交通、收入" />
          </label>
          <label>
            名目 / 備註
            <input id="noteInput" name="note" placeholder="例如：午餐炒飯、捷運、加油" />
          </label>
          <div class="form-actions">
            <button id="cancelEditButton" type="button">取消</button>
            <button class="primary-button" type="submit">儲存資料</button>
          </div>
        </form>
      </section>

      <section class="glass-card">
        <div class="section-title">
          <div><p class="label">Google 採集中繼站</p><h2>雲端同步</h2></div>
          <span id="cloudState" class="save-hint">尚未設定</span>
        </div>
        <div class="sync-config">
          <label>Apps Script 網址<input id="relayUrlInput" type="url" placeholder="https://script.google.com/macros/s/…/exec" /></label>
          <label>配對碼<input id="relayTokenInput" type="password" autocomplete="off" placeholder="只儲存在這支手機" /></label>
        </div>
        <div class="sync-actions">
          <button id="saveRelayButton" type="button">儲存連線設定</button>
          <button id="syncNowButton" class="primary-button" type="button">立即同步</button>
        </div>
        <p class="notice">記帳永遠先存入手機；有網路時會自動嘗試上傳。只有取得雲端收據後才會標示「雲端」。</p>
      </section>

      <section class="glass-card">
        <div class="section-title">
          <div>
            <p class="label">採集區</p>
            <h2>手機本地資料</h2>
          </div>
          <input id="searchInput" class="search-input" type="search" placeholder="搜尋名目、分類、日期" />
        </div>
        <div id="transactionList" class="transaction-list" aria-live="polite"></div>
      </section>

      <section class="glass-card">
        <div class="section-title">
          <div>
            <p class="label">救援與備份</p>
            <h2>手動匯出 / 匯入</h2>
          </div>
          <span id="syncSummary" class="save-hint">尚未同步</span>
        </div>
        <div class="sync-actions">
          <button id="exportJsonButton" type="button">匯出 JSON</button>
          <button id="exportCsvButton" type="button">匯出 CSV</button>
          <label class="file-button">
            匯入 JSON
            <input id="importJsonInput" type="file" accept="application/json,.json" />
          </label>
        </div>
        <label class="cleanup-setting"><input id="autoCleanupInput" type="checkbox" /> 自動清理已送達平台滿 7 天的手機資料</label>
        <button id="cleanupPlatformButton" type="button">清理資料</button>
        <p class="notice">匯出後不會自動刪除手機資料。匯出的 JSON / CSV 之後再回到本地桌面平台手動匯入。</p>
        <details id="trashSection">
          <summary>垃圾桶（<span id="trashCount">0</span>）</summary>
          <p class="notice">垃圾桶不影響快速記帳。可逐筆還原，或經二次確認後永久刪除。</p>
          <div id="trashList" class="transaction-list"></div>
          <button id="emptyTrashButton" class="danger-button" type="button">清空垃圾桶</button>
        </details>
        <div id="syncLogList" class="sync-log-list"></div>
      </section>
    </main>

    <div id="undoToast" class="undo-toast" role="status" aria-live="polite" hidden>
      <span>已移入垃圾桶</span><button id="undoDeleteButton" type="button">Undo</button>
    </div>

    <template id="transactionTemplate">
      <article class="transaction-item">
        <div>
          <p class="item-meta"></p>
          <h3></h3>
          <p class="item-note"></p>
        </div>
        <div class="item-side">
          <strong></strong>
          <span></span>
          <div class="item-actions">
            <button type="button" data-action="edit">編輯</button>
            <button type="button" data-action="delete">刪除</button>
          </div>
        </div>
      </article>
    </template>

    <script src="./app.js" type="module"></script>
  </body>
</html>
